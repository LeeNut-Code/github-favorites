<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>栗子的GitHub收藏夹</title>
<style>
/* ============ Reset & Base ============ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: background 0.3s, color 0.3s;
  min-height: 100vh;
}

/* ============ Theme Variables ============ */
:root {
  --bg: #FFF8F0;
  --surface: #FFFFFF;
  --surface-hover: #FFF3E0;
  --text: #2C2416;
  --text-secondary: #8B7355;
  --text-muted: #B8A88E;
  --primary: #C4943E;
  --primary-light: #E8D5A8;
  --primary-dark: #A07530;
  --border: #E8DDD0;
  --tag-bg: #F5EDE0;
  --tag-text: #8B7355;
  --card-shadow: 0 2px 8px rgba(0,0,0,0.06);
  --card-shadow-hover: 0 4px 16px rgba(0,0,0,0.10);
  --input-bg: #FFFFFF;
  --input-border: #D4C8B8;
  --header-bg: rgba(255, 248, 240, 0.92);
  --tab-active-bg: #C4943E;
  --tab-active-text: #FFFFFF;
  --tab-hover-bg: #F0E6D8;
  --badge-bg: #C4943E;
  --badge-text: #FFFFFF;
  --link-color: #2D8E4A;
  --divider: #E8DDD0;
  --stat-card-bg: #FFFDF8;
}

[data-theme="dark"] {
  --bg: #1A1510;
  --surface: #2A2218;
  --surface-hover: #3A3022;
  --text: #E8DCC8;
  --text-secondary: #B8A88E;
  --text-muted: #7A6A54;
  --primary: #D4A74B;
  --primary-light: #5A4A32;
  --primary-dark: #E8C87A;
  --border: #3A3228;
  --tag-bg: #3A3022;
  --tag-text: #C8B898;
  --card-shadow: 0 2px 8px rgba(0,0,0,0.2);
  --card-shadow-hover: 0 4px 16px rgba(0,0,0,0.3);
  --input-bg: #2A2218;
  --input-border: #4A3E2E;
  --header-bg: rgba(26, 21, 16, 0.92);
  --tab-hover-bg: #3A3022;
  --badge-bg: #D4A74B;
  --badge-text: #1A1510;
  --link-color: #5BBF7A;
  --divider: #3A3228;
  --stat-card-bg: #222016;
}

/* ============ Header ============ */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--header-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
}
.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-icon {
  font-size: 28px;
  line-height: 1;
}
.header-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
}
.header-title span {
  color: var(--primary);
}
.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}
.theme-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  cursor: pointer;
  font-size: 18px;
  color: var(--text-secondary);
  transition: all 0.2s;
  line-height: 1;
}
.theme-btn:hover {
  background: var(--surface-hover);
  color: var(--primary);
}

/* ============ Stats Bar ============ */
.stats-bar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px 24px 0;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 12px;
}
.stat-card {
  background: var(--stat-card-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  text-align: center;
}
.stat-number {
  font-size: 24px;
  font-weight: 700;
  color: var(--primary);
  line-height: 1.2;
}
.stat-label {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 4px;
}

/* ============ Month Tabs ============ */
.tabs-wrapper {
  max-width: 1200px;
  margin: 0 auto;
  padding: 16px 24px 0;
}
.tabs {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 8px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
}
.tabs::-webkit-scrollbar {
  height: 4px;
}
.tabs::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 2px;
}
.tab-btn {
  flex-shrink: 0;
  padding: 8px 18px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: var(--surface);
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.2s;
  white-space: nowrap;
}
.tab-btn:hover {
  background: var(--tab-hover-bg);
  color: var(--text);
}
.tab-btn.active {
  background: var(--tab-active-bg);
  color: var(--tab-active-text);
  border-color: var(--tab-active-bg);
}
.tab-count {
  display: inline-block;
  margin-left: 4px;
  font-size: 11px;
  opacity: 0.7;
}

/* ============ Filters ============ */
.filters {
  max-width: 1200px;
  margin: 0 auto;
  padding: 12px 24px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
}
.search-box {
  flex: 1;
  min-width: 200px;
  position: relative;
}
.search-box input {
  width: 100%;
  padding: 10px 14px 10px 38px;
  border: 1px solid var(--input-border);
  border-radius: 10px;
  background: var(--input-bg);
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.search-box input:focus {
  border-color: var(--primary);
}
.search-box .search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 16px;
  pointer-events: none;
}
.category-filter select {
  padding: 10px 14px;
  border: 1px solid var(--input-border);
  border-radius: 10px;
  background: var(--input-bg);
  color: var(--text);
  font-size: 14px;
  outline: none;
  cursor: pointer;
  min-width: 120px;
}
.category-filter select:focus {
  border-color: var(--primary);
}

/* ============ Card Grid ============ */
.grid-wrapper {
  max-width: 1200px;
  margin: 0 auto;
  padding: 12px 24px 40px;
}
.grid-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.grid-count {
  font-size: 13px;
  color: var(--text-secondary);
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 12px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  transition: all 0.2s;
  box-shadow: var(--card-shadow);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.card:hover {
  box-shadow: var(--card-shadow-hover);
  border-color: var(--primary-light);
  transform: translateY(-1px);
}
.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
}
.card-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  text-decoration: none;
  line-height: 1.4;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.card-name:hover {
  color: var(--link-color);
}
.card-name .owner {
  color: var(--text-secondary);
  font-weight: 400;
}
.card-link {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  background: var(--tag-bg);
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 14px;
  transition: all 0.2s;
}
.card-link:hover {
  background: #2D8E4A;
  color: white;
}
[data-theme="dark"] .card-link:hover {
  background: #5BBF7A;
  color: #1A1510;
}
.card-desc {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.5;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
}
.card-footer {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: auto;
  padding-top: 4px;
}
.tag {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 500;
  background: var(--tag-bg);
  color: var(--tag-text);
}
.tag-month {
  background: var(--badge-bg);
  color: var(--badge-text);
}

.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.empty-state .empty-icon {
  font-size: 48px;
  margin-bottom: 12px;
  display: block;
}
.empty-state p {
  font-size: 15px;
}

/* ============ Back to Top ============ */
.back-top {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--primary);
  color: var(--badge-text);
  border: none;
  cursor: pointer;
  font-size: 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.3s;
  z-index: 90;
}
.back-top.visible {
  opacity: 1;
  transform: translateY(0);
}
.back-top:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
.back-top.visible:hover {
  transform: translateY(-2px);
}

/* ============ Footer ============ */
.footer {
  text-align: center;
  padding: 24px;
  color: var(--text-muted);
  font-size: 13px;
  border-top: 1px solid var(--border);
}

/* ============ Responsive ============ */
@media (max-width: 768px) {
  .header { padding: 12px 16px; }
  .header-title { font-size: 17px; }
  .stats-bar { padding: 16px 16px 0; grid-template-columns: repeat(2, 1fr); }
  .tabs-wrapper { padding: 12px 16px 0; }
  .filters { padding: 8px 16px; flex-direction: column; }
  .search-box { min-width: 100%; }
  .category-filter select { width: 100%; }
  .grid-wrapper { padding: 8px 16px 24px; }
  .grid { grid-template-columns: 1fr; }
  .stat-card { padding: 10px 12px; }
  .stat-number { font-size: 20px; }
}

@media (min-width: 769px) and (max-width: 1024px) {
  .grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>

  MONTH_STATS.forEach(m => {
    if (m.count === 0) return;
    html += `<button class="tab-btn ${m.id === currentMonth ? 'active' : ''}" onclick="switchMonth('${m.id}')">${m.label} <span class="tab-count">${m.count}</span></button>`;
  });
  container.innerHTML = html;
}

function switchMonth(month) {
  currentMonth = month;
  renderTabs();
  renderGrid();
  document.getElementById("backTop").click();
}

// ============ RENDER CATEGORY FILTER ============
function renderCategoryFilter() {
  const select = document.getElementById("categoryFilter");
  ALL_CATEGORIES.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c;
    opt.textContent = c;
    select.appendChild(opt);
  });
}

// ============ RENDER CARD GRID ============
function getFilteredProjects() {
  return PROJECTS.filter(p => {
    if (currentMonth !== "all" && p.month !== currentMonth) return false;
    if (currentCategory && p.category !== currentCategory) return false;
    if (currentSearch) {
      const q = currentSearch.toLowerCase();
      const searchable = (p.name + " " + p.description + " " + (p.category || "")).toLowerCase();
      if (!searchable.includes(q)) return false;
    }
    return true;
  });
}

function renderGrid() {
  const filtered = getFilteredProjects();
  const grid = document.getElementById("projectGrid");
  const count = document.getElementById("gridCount");

  count.textContent = `显示 ${filtered.length} / ${PROJECTS.length} 个项目`;

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state"><span class="empty-icon">🔍</span><p>没有找到匹配的项目 😅</p></div>';
    return;
  }

  grid.innerHTML = filtered.map(p => {
    const nameParts = p.name.split("/");
    const owner = nameParts.length > 1 ? nameParts[0] : "";
    const repoName = nameParts.length > 1 ? nameParts.slice(1).join("/") : p.name;

    return `
      <div class="card">
        <div class="card-top">
          <a href="${p.url}" target="_blank" rel="noopener" class="card-name" title="${html(p.url)}">
            ${owner ? `<span class="owner">${owner}</span>/${repoName}` : p.name}
          </a>
          <a href="${p.url}" target="_blank" rel="noopener" class="card-link" title="在 GitHub 中打开">↗</a>
        </div>
        ${p.description ? `<div class="card-desc">${html(p.description)}</div>` : ''}
        <div class="card-footer">
          ${p.category ? `<span class="tag">${html(p.category)}</span>` : ''}
          <span class="tag tag-month">${p.monthLabel}</span>
        </div>
      </div>
    `;
  }).join("");
}

function html(s) {
  if (!s) return "";
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ============ EVENT LISTENERS ============
document.getElementById("searchInput").addEventListener("input", (e) => {
  currentSearch = e.target.value;
  renderGrid();
});

document.getElementById("categoryFilter").addEventListener("change", (e) => {
  currentCategory = e.target.value;
  renderGrid();
});

// ============ THEME TOGGLE ============
const themeToggle = document.getElementById("themeToggle");
themeToggle.addEventListener("click", () => {
  const html = document.documentElement;
  const isDark = html.getAttribute("data-theme") === "dark";
  html.setAttribute("data-theme", isDark ? "light" : "dark");
  themeToggle.textContent = isDark ? "🌙" : "☀️";
  localStorage.setItem("theme", isDark ? "light" : "dark");
});

// Restore theme
const savedTheme = localStorage.getItem("theme");
if (savedTheme === "dark") {
  document.documentElement.setAttribute("data-theme", "dark");
  themeToggle.textContent = "☀️";
}

// ============ BACK TO TOP VISIBILITY ============
window.addEventListener("scroll", () => {
  const btn = document.getElementById("backTop");
  btn.classList.toggle("visible", window.scrollY > 300);
});

// ============ INIT ============
renderStats();
renderTabs();
renderCategoryFilter();
renderGrid();
</script>
</body>
</html>
